<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gestor Flota</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: {
            brand: { green: { DEFAULT: '#166534', dark: '#14532d', light: '#22c55e', muted: '#dcfce7' }, amber: '#f59e0b', cream: '#fefce8' }
        }, fontFamily: { sans: ['Inter', 'sans-serif'] } } } }
    </script>
    <script>
        if (localStorage.getItem('darkMode') === 'true') document.documentElement.classList.add('dark');
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .login-bg {
            background: linear-gradient(135deg, #14532d 0%, #166534 40%, #15803d 100%);
            position: relative; overflow: hidden;
        }
        .login-bg::before {
            content: ''; position: absolute; top: -50%; right: -30%; width: 80%; height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
            animation: float 20s ease-in-out infinite;
        }
        .login-bg::after {
            content: ''; position: absolute; bottom: -40%; left: -20%; width: 60%; height: 150%;
            background: radial-gradient(circle, rgba(34,197,94,0.08) 0%, transparent 60%);
            animation: float 15s ease-in-out infinite reverse;
        }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .glass-card {
            background: rgba(255,255,255,0.07);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.12);
        }
        .input-modern { transition: all 0.3s ease; }
        .input-modern:focus { box-shadow: 0 0 0 3px rgba(34,197,94,0.3); }
        .slide-up { animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1); }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .btn-glow:hover { box-shadow: 0 0 30px rgba(34,197,94,0.4); }
    </style>
</head>
<body class="login-bg h-screen w-full flex items-center justify-center p-4">

    <div class="glass-card p-8 md:p-12 rounded-3xl shadow-2xl w-full max-w-md slide-up relative z-10">

        <div class="flex flex-col items-center mb-10">
            <div class="bg-white rounded-2xl p-1 shadow-xl w-24 h-24 flex items-center justify-center overflow-hidden mb-5 ring-4 ring-white/10">
                <img src="/static/logo.png" alt="Logo" class="w-full h-full object-cover rounded-xl">
            </div>
            <p class="text-green-300 text-[11px] uppercase tracking-[0.25em] font-semibold">Semillero</p>
            <h1 class="text-white font-extrabold text-3xl mt-1 tracking-tight">
                El Manantial
                <span class="text-xs font-normal text-white/40 ml-1">S.R.L</span>
            </h1>
            <p class="text-white/30 text-xs mt-2">Gestor de Flota</p>
        </div>

        {% if error %}
        <div class="mb-6 p-3 bg-red-500/20 border border-red-400/30 text-red-200 text-sm rounded-xl text-center font-medium flex items-center justify-center gap-2">
            <i data-lucide="alert-circle" class="w-4 h-4"></i>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-5">
            <div>
                <label class="block text-white/60 text-xs font-medium mb-2 uppercase tracking-wider">Usuario</label>
                <div class="relative">
                    <i data-lucide="user" class="absolute left-4 top-3.5 w-4 h-4 text-gray-400"></i>
                    <input type="text" name="username" required autocomplete="username"
                        class="input-modern w-full pl-11 pr-4 py-3 bg-white/10 border border-white/10 rounded-xl text-white placeholder-white/30 focus:outline-none focus:bg-white/15 focus:border-green-400/50"
                        placeholder="Ingrese usuario" />
                </div>
            </div>
            <div>
                <label class="block text-white/60 text-xs font-medium mb-2 uppercase tracking-wider">Contraseña</label>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-4 top-3.5 w-4 h-4 text-gray-400"></i>
                    <input type="password" name="password" required autocomplete="current-password"
                        class="input-modern w-full pl-11 pr-4 py-3 bg-white/10 border border-white/10 rounded-xl text-white placeholder-white/30 focus:outline-none focus:bg-white/15 focus:border-green-400/50"
                        placeholder="••••••" />
                </div>
            </div>

            <button type="submit" class="btn-glow w-full bg-gradient-to-r from-green-500 to-green-600 hover:from-green-400 hover:to-green-500 text-white font-bold py-3.5 rounded-xl transition-all duration-300 transform hover:scale-[1.02] shadow-lg mt-2 flex items-center justify-center gap-2">
                <i data-lucide="log-in" class="w-4 h-4"></i>
                INGRESAR
            </button>
        </form>

        <p class="text-center text-white/20 text-[10px] mt-8 tracking-wider">GESTOR FLOTA v4.0</p>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
